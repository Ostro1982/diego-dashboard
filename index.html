<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diego Ostro | Project Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#080b14;
  --bg-card:#0d1220;
  --bg-card-hover:#111829;
  --bg-surface:#151d30;
  --border:#1a2540;
  --border-hover:#253560;
  --text-primary:#e8ecf4;
  --text-secondary:#7b8bb2;
  --text-muted:#4a5a80;
  --cyan:#00d4ff;
  --cyan-dim:#00d4ff30;
  --green:#00e676;
  --green-dim:#00e67630;
  --amber:#ffab00;
  --amber-dim:#ffab0030;
  --red:#ff3d5a;
  --red-dim:#ff3d5a30;
  --purple:#b388ff;
  --purple-dim:#b388ff30;
  --pink:#ff4081;
  --font-display:'Chakra Petch',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-mono);
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, #00d4ff08 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, #b388ff06 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* HEADER */
.header{
  position:relative;z-index:1;
  padding:2rem 2rem 0;
  max-width:1400px;margin:0 auto;
}
.header-top{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:1rem;
  margin-bottom:2rem;
}
.brand{display:flex;align-items:center;gap:1rem}
.brand-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg,var(--cyan),#0066ff);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:700;font-size:1.4rem;color:#fff;
  box-shadow:0 0 30px #00d4ff20;
}
.brand h1{
  font-family:var(--font-display);font-weight:700;font-size:1.5rem;
  letter-spacing:0.05em;
}
.brand h1 span{color:var(--cyan)}
.header-meta{
  font-size:0.75rem;color:var(--text-muted);
  display:flex;gap:1.5rem;align-items:center;
}
.header-meta .pulse{
  display:inline-block;width:8px;height:8px;
  background:var(--green);border-radius:50%;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 #00e67660}50%{opacity:.7;box-shadow:0 0 0 6px #00e67600}}

/* STATS BAR */
.stats-bar{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:1rem;margin-bottom:2rem;
  position:relative;z-index:1;
}
.stat-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:1rem 1.2rem;
  transition:all .2s;
}
.stat-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.stat-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:0.3rem}
.stat-value{font-family:var(--font-display);font-size:1.8rem;font-weight:700;line-height:1}
.stat-value.cyan{color:var(--cyan)}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-value.purple{color:var(--purple)}
.stat-sub{font-size:0.7rem;color:var(--text-secondary);margin-top:0.25rem}

/* TABS */
.tabs-container{
  position:relative;z-index:1;
  max-width:1400px;margin:0 auto;
  padding:0 2rem;
}
.tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);
  margin-bottom:1.5rem;
}
.tab{
  font-family:var(--font-display);font-weight:600;font-size:0.85rem;
  letter-spacing:0.05em;text-transform:uppercase;
  padding:0.8rem 1.5rem;
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;position:relative;
  transition:color .2s;
}
.tab:hover{color:var(--text-secondary)}
.tab.active{color:var(--cyan)}
.tab.active::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);
}
.tab .count{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;border-radius:10px;
  background:var(--bg-surface);
  font-size:0.65rem;padding:0 6px;margin-left:6px;
  font-family:var(--font-mono);
}
.tab.active .count{background:var(--cyan-dim);color:var(--cyan)}

/* FILTERS */
.filters{
  display:flex;gap:0.75rem;flex-wrap:wrap;
  margin-bottom:1.5rem;align-items:center;
}
.search-box{
  flex:1;min-width:200px;max-width:350px;
  position:relative;
}
.search-box input{
  width:100%;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:0.6rem 1rem 0.6rem 2.2rem;
  color:var(--text-primary);
  font-family:var(--font-mono);font-size:0.8rem;
  outline:none;transition:border-color .2s;
}
.search-box input:focus{border-color:var(--cyan)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box::before{
  content:'\2315';position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);
  color:var(--text-muted);font-size:1rem;
}
.filter-btn{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:8px;padding:0.5rem 1rem;
  color:var(--text-secondary);font-family:var(--font-mono);font-size:0.72rem;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}
.filter-btn.sub-btn.active{border-color:var(--purple);color:var(--purple);background:var(--purple-dim)}
.filter-group{display:flex;gap:0.5rem;flex-wrap:wrap}
.filters.sub-filters{margin-top:-0.75rem;margin-bottom:1.25rem}

/* GRID */
.projects-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
  gap:1rem;
  padding-bottom:3rem;
}
.tab-content{display:none}
.tab-content.active{display:block}

/* PROJECT CARD */
.project-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.4rem;
  transition:all .3s;
  cursor:default;
  position:relative;
  overflow:hidden;
}
.project-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  opacity:0;transition:opacity .3s;
}
.project-card:hover{
  border-color:var(--border-hover);
  transform:translateY(-3px);
  box-shadow:0 10px 40px #00000040;
}
.project-card:hover::before{opacity:1}
.project-card[data-accent="cyan"]::before{background:linear-gradient(90deg,var(--cyan),transparent)}
.project-card[data-accent="green"]::before{background:linear-gradient(90deg,var(--green),transparent)}
.project-card[data-accent="amber"]::before{background:linear-gradient(90deg,var(--amber),transparent)}
.project-card[data-accent="purple"]::before{background:linear-gradient(90deg,var(--purple),transparent)}
.project-card[data-accent="red"]::before{background:linear-gradient(90deg,var(--red),transparent)}
.project-card[data-accent="pink"]::before{background:linear-gradient(90deg,var(--pink),transparent)}

.card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;margin-bottom:0.8rem}
.card-title{font-family:var(--font-display);font-weight:700;font-size:1.1rem;line-height:1.2}
.card-type{
  font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;
  padding:3px 8px;border-radius:4px;white-space:nowrap;
  font-weight:600;flex-shrink:0;
}
.type-app{background:var(--cyan-dim);color:var(--cyan)}
.type-bot{background:var(--green-dim);color:var(--green)}
.type-tool{background:var(--amber-dim);color:var(--amber)}
.type-service{background:var(--purple-dim);color:var(--purple)}
.type-idea{background:var(--red-dim);color:var(--red)}
.type-content{background:var(--pink);color:#fff;background:var(--pink);opacity:.85}

.card-desc{font-size:0.75rem;color:var(--text-secondary);line-height:1.5;margin-bottom:1rem}

.card-metrics{
  display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;
  margin-bottom:1rem;
}
.metric{
  background:var(--bg-surface);
  border-radius:8px;
  padding:0.5rem 0.7rem;
}
.metric-label{font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
.metric-value{font-family:var(--font-display);font-size:0.95rem;font-weight:600;margin-top:0.15rem}
.metric-value.positive{color:var(--green)}
.metric-value.warning{color:var(--amber)}
.metric-value.info{color:var(--cyan)}

.card-stack{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0.8rem}
.stack-tag{
  font-size:0.6rem;padding:2px 7px;border-radius:4px;
  background:var(--bg-surface);color:var(--text-secondary);
  border:1px solid var(--border);
}

.card-status{
  display:flex;align-items:center;gap:0.5rem;
  padding-top:0.8rem;border-top:1px solid var(--border);
}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green-dim)}
.status-dot.dev{background:var(--cyan);box-shadow:0 0 8px var(--cyan-dim)}
.status-dot.paper{background:var(--amber);box-shadow:0 0 8px var(--amber-dim)}
.status-dot.paused{background:var(--text-muted)}
.status-dot.idea{background:var(--purple);box-shadow:0 0 8px var(--purple-dim)}
.status-text{font-size:0.7rem;color:var(--text-secondary)}
.status-text strong{color:var(--text-primary);font-weight:500}

.card-links{
  display:flex;gap:0.5rem;margin-top:0.8rem;flex-wrap:wrap;
}
.card-link{
  font-size:0.65rem;padding:3px 10px;border-radius:6px;
  background:var(--bg-surface);color:var(--cyan);
  text-decoration:none;border:1px solid var(--border);
  transition:all .2s;
}
.card-link:hover{border-color:var(--cyan);background:var(--cyan-dim)}

/* IDEA CARDS (simpler) */
.idea-card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.2rem 1.4rem;
  transition:all .3s;
}
.idea-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.idea-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem}
.idea-fire{font-size:1rem;flex-shrink:0}
.idea-title{font-family:var(--font-display);font-weight:600;font-size:0.95rem}
.idea-desc{font-size:0.73rem;color:var(--text-secondary);line-height:1.5;margin-bottom:0.7rem}
.idea-tags{display:flex;gap:4px;flex-wrap:wrap}
.idea-tag{
  font-size:0.6rem;padding:2px 8px;border-radius:4px;
  border:1px solid var(--border);color:var(--text-muted);
}
.idea-tag.hot{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
.idea-tag.blocked{border-color:var(--red);color:var(--red);background:var(--red-dim)}
.idea-tag.ready{border-color:var(--green);color:var(--green);background:var(--green-dim)}

/* REVENUE BADGE */
.revenue-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:0.62rem;font-weight:600;
  padding:2px 8px;border-radius:4px;margin-top:0.5rem;
}
.revenue-badge.high{background:var(--green-dim);color:var(--green)}
.revenue-badge.medium{background:var(--amber-dim);color:var(--amber)}
.revenue-badge.low{background:var(--bg-surface);color:var(--text-muted)}
.revenue-badge.personal{background:var(--purple-dim);color:var(--purple)}

/* FOOTER */
.footer{
  position:relative;z-index:1;
  text-align:center;padding:2rem;
  font-size:0.65rem;color:var(--text-muted);
  border-top:1px solid var(--border);
  max-width:1400px;margin:2rem auto 0;
}

/* RESPONSIVE */
@media(max-width:768px){
  .header{padding:1rem}
  .tabs-container{padding:0 1rem}
  .projects-grid{grid-template-columns:1fr}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .brand h1{font-size:1.1rem}
  .card-metrics{grid-template-columns:1fr}
}
@media(max-width:480px){
  .stats-bar{grid-template-columns:1fr}
  .filters{flex-direction:column}
  .search-box{max-width:100%}
}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:#000c;backdrop-filter:blur(8px);
  z-index:100;justify-content:center;align-items:center;
  padding:1rem;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:16px;max-width:600px;width:100%;
  max-height:85vh;overflow-y:auto;padding:2rem;
  position:relative;
}
.modal-close{
  position:absolute;top:1rem;right:1rem;
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;font-size:1.2rem;padding:0.3rem;
  transition:color .2s;
}
.modal-close:hover{color:var(--text-primary)}
.modal h2{font-family:var(--font-display);font-size:1.3rem;margin-bottom:0.3rem}
.modal-section{margin-top:1.2rem}
.modal-section h3{
  font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text-muted);margin-bottom:0.5rem;
}
.modal-section p,.modal-section li{font-size:0.8rem;color:var(--text-secondary);line-height:1.6}
.modal-section ul{list-style:none;padding:0}
.modal-section li::before{content:'>';color:var(--cyan);margin-right:0.5rem;font-weight:700}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.project-card,.idea-card{animation:fadeInUp .4s ease both}
.projects-grid .project-card:nth-child(1),.projects-grid .idea-card:nth-child(1){animation-delay:.05s}
.projects-grid .project-card:nth-child(2),.projects-grid .idea-card:nth-child(2){animation-delay:.1s}
.projects-grid .project-card:nth-child(3),.projects-grid .idea-card:nth-child(3){animation-delay:.15s}
.projects-grid .project-card:nth-child(4),.projects-grid .idea-card:nth-child(4){animation-delay:.2s}
.projects-grid .project-card:nth-child(5),.projects-grid .idea-card:nth-child(5){animation-delay:.25s}
.projects-grid .project-card:nth-child(6),.projects-grid .idea-card:nth-child(6){animation-delay:.3s}
.projects-grid .project-card:nth-child(7),.projects-grid .idea-card:nth-child(7){animation-delay:.35s}
.projects-grid .project-card:nth-child(8),.projects-grid .idea-card:nth-child(8){animation-delay:.4s}
.projects-grid .project-card:nth-child(9),.projects-grid .idea-card:nth-child(9){animation-delay:.45s}
.projects-grid .project-card:nth-child(10),.projects-grid .idea-card:nth-child(10){animation-delay:.5s}
.projects-grid .project-card:nth-child(11),.projects-grid .idea-card:nth-child(11){animation-delay:.55s}
.projects-grid .project-card:nth-child(12),.projects-grid .idea-card:nth-child(12){animation-delay:.6s}

/* ACTION BUTTONS */
.card-actions{
  position:absolute;top:0.8rem;right:0.8rem;
  display:flex;gap:4px;opacity:0;transition:opacity .2s;z-index:2;
}
.project-card:hover .card-actions,.idea-card:hover .card-actions{opacity:1}
.action-btn{
  width:28px;height:28px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg-surface);
  color:var(--text-muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;transition:all .2s;
}
.action-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}
.action-btn.delete:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}

/* ADD BUTTON */
.add-btn{
  background:var(--bg-card);border:2px dashed var(--border);
  border-radius:14px;padding:2rem;
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  color:var(--text-muted);cursor:pointer;
  font-family:var(--font-mono);font-size:0.8rem;
  transition:all .3s;min-height:200px;
}
.add-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-dim)}

/* FORM MODAL */
.form-group{margin-bottom:1rem}
.form-group label{
  display:block;font-size:0.65rem;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.3rem;
}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--bg-surface);
  border:1px solid var(--border);border-radius:8px;
  padding:0.6rem 0.8rem;color:var(--text-primary);
  font-family:var(--font-mono);font-size:0.8rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan)}
.form-textarea{resize:vertical;min-height:60px}
.form-select{cursor:pointer}
.form-select option{background:var(--bg-card);color:var(--text-primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.form-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:0.3rem}
.form-chip{
  font-size:0.65rem;padding:3px 8px;border-radius:4px;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text-secondary);display:flex;align-items:center;gap:4px;
}
.form-chip .remove-chip{cursor:pointer;color:var(--red);font-weight:700}
.chip-input{
  display:flex;gap:4px;margin-top:0.3rem;
}
.chip-input input{flex:1}
.chip-input button{
  background:var(--cyan-dim);border:1px solid var(--cyan);
  color:var(--cyan);border-radius:6px;padding:0.3rem 0.6rem;
  cursor:pointer;font-size:0.7rem;font-family:var(--font-mono);
}
.form-actions{
  display:flex;gap:0.75rem;justify-content:flex-end;
  margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);
}
.btn{
  padding:0.6rem 1.5rem;border-radius:8px;
  font-family:var(--font-mono);font-size:0.8rem;
  cursor:pointer;transition:all .2s;border:1px solid;
}
.btn-primary{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}
.btn-primary:hover{background:var(--cyan);color:#000}
.btn-cancel{background:transparent;border-color:var(--border);color:var(--text-muted)}
.btn-cancel:hover{border-color:var(--text-secondary);color:var(--text-secondary)}
.btn-danger{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}

/* TOAST */
.toast{
  position:fixed;bottom:2rem;right:2rem;z-index:200;
  background:var(--bg-card);border:1px solid var(--green);
  border-radius:10px;padding:0.8rem 1.2rem;
  color:var(--green);font-size:0.8rem;
  box-shadow:0 4px 20px #00000060;
  transform:translateY(100px);opacity:0;transition:all .3s;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:var(--red);color:var(--red)}

/* TOOLBAR */
.data-toolbar{
  display:flex;gap:0.5rem;align-items:center;
  margin-left:auto;
}
.toolbar-btn{
  background:var(--bg-surface);border:1px solid var(--border);
  border-radius:6px;padding:0.35rem 0.7rem;
  color:var(--text-muted);cursor:pointer;
  font-family:var(--font-mono);font-size:0.65rem;
  transition:all .2s;
}
.toolbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}

/* CONFIRM DIALOG */
.confirm-overlay{
  display:none;position:fixed;inset:0;
  background:#000c;backdrop-filter:blur(4px);
  z-index:150;justify-content:center;align-items:center;
}
.confirm-overlay.active{display:flex}
.confirm-box{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;padding:1.5rem;max-width:400px;width:90%;
  text-align:center;
}
.confirm-box h3{font-family:var(--font-display);margin-bottom:0.5rem}
.confirm-box p{font-size:0.8rem;color:var(--text-secondary);margin-bottom:1.2rem}
.confirm-actions{display:flex;gap:0.75rem;justify-content:center}

/* scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* NEXT STEP highlight */
.next-step{
  font-size:0.72rem;color:var(--text-secondary);
  background:var(--bg-surface);border-radius:8px;
  padding:0.5rem 0.7rem;margin-top:0.6rem;
  border-left:2px solid var(--cyan);
  line-height:1.4;
}
.next-step strong{color:var(--cyan);font-weight:600}

/* DASHBOARD TAB */
.dash-subtabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.dash-subtab{
  font-family:var(--font-display);font-weight:600;font-size:0.75rem;
  letter-spacing:0.03em;padding:0.6rem 1.2rem;
  background:none;border:none;color:var(--text-muted);
  cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;
  display:flex;align-items:center;gap:0.5rem;
}
.dash-subtab:hover{color:var(--text-secondary)}
.dash-subtab.active{color:var(--cyan)}
.dash-subtab.active::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:2px;background:var(--cyan);box-shadow:0 0 10px var(--cyan);
}
.dash-status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dash-status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green)}
.dash-status-dot.offline{background:var(--red);box-shadow:0 0 6px var(--red)}
.dash-stats{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:0.75rem;margin-bottom:1.5rem;
}
.dash-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem}
.dash-stat-label{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.2rem}
.dash-stat-value{font-family:var(--font-display);font-size:1.2rem;font-weight:700}
.dash-table-wrap{overflow-x:auto;margin-bottom:1.5rem}
.dash-table{width:100%;border-collapse:collapse;font-size:0.72rem}
.dash-table th{
  text-align:left;padding:0.5rem 0.7rem;font-size:0.6rem;text-transform:uppercase;
  letter-spacing:0.08em;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:600;
}
.dash-table td{padding:0.5rem 0.7rem;border-bottom:1px solid var(--border);color:var(--text-secondary)}
.dash-table tr:hover td{background:var(--bg-card-hover)}
.dash-section-title{font-family:var(--font-display);font-size:0.85rem;font-weight:700;margin-bottom:0.75rem}
.overview-chains{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1rem;margin-bottom:1.5rem;
}
.overview-chain-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
  padding:1.2rem;cursor:pointer;transition:all .3s;
}
.overview-chain-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
.dash-loading{color:var(--text-muted);text-align:center;padding:3rem;font-size:0.8rem}
</style>
</head>
<body>

// =====================================================
// DATA LAYER - localStorage persistence
// =====================================================
const STORAGE_KEY_PROJECTS = 'dashboard_projects';
const STORAGE_KEY_IDEAS = 'dashboard_ideas';

function loadProjects() {
  const saved = localStorage.getItem(STORAGE_KEY_PROJECTS);
  return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
}
function loadIdeas() {
  const saved = localStorage.getItem(STORAGE_KEY_IDEAS);
  return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_IDEAS));
}
function saveProjects(data) { localStorage.setItem(STORAGE_KEY_PROJECTS, JSON.stringify(data)); }
function saveIdeas(data) { localStorage.setItem(STORAGE_KEY_IDEAS, JSON.stringify(data)); }

let PROJECTS = loadProjects();
let IDEAS = loadIdeas();

// =====================================================
// TOAST
// =====================================================
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

// =====================================================
// EXPORT / IMPORT / RESET
// =====================================================
function exportData() {
  const data = { projects: PROJECTS, ideas: IDEAS, exported: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dashboard-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('Datos exportados');
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.projects) { PROJECTS = data.projects; saveProjects(PROJECTS); }
      if (data.ideas) { IDEAS = data.ideas; saveIdeas(IDEAS); }
      refreshAll();
      showToast('Datos importados correctamente');
    } catch(err) { showToast('Error al importar: JSON invalido', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function resetData() {
  pendingConfirmAction = () => {
    localStorage.removeItem(STORAGE_KEY_PROJECTS);
    localStorage.removeItem(STORAGE_KEY_IDEAS);
    PROJECTS = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
    IDEAS = JSON.parse(JSON.stringify(DEFAULT_IDEAS));
    refreshAll();
    showToast('Datos restaurados a valores originales');
  };
  showConfirm('Restaurar datos', 'Se perderan todos los cambios. Volver a los datos originales?', 'Restaurar');
}

function refreshAll() {
  renderStats();
  renderDevelopedProjects(currentFilter, document.getElementById('search').value.toLowerCase());
  renderIdeas(document.getElementById('search').value.toLowerCase());
}

let pendingConfirmAction = null;
function showConfirm(title, msg, btnText = 'Eliminar') {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok').textContent = btnText;
  document.getElementById('confirm-dialog').classList.add('active');
}
function closeConfirm() {
  document.getElementById('confirm-dialog').classList.remove('active');
  pendingConfirmAction = null;
}
function confirmAction() {
  if (pendingConfirmAction) pendingConfirmAction();
  closeConfirm();
}

// CRUD - DELETE
// =====================================================
function deleteProject(id, e) {
  if (e) e.stopPropagation();
  const p = PROJECTS.find(x => x.id === id);
  if (!p) return;
  pendingConfirmAction = () => {
    PROJECTS = PROJECTS.filter(x => x.id !== id);
    saveProjects(PROJECTS);
    refreshAll();
    showToast('Proyecto "' + p.name + '" eliminado');
  };
  showConfirm('Eliminar proyecto', 'Eliminar "' + p.name + '"? Esta accion no se puede deshacer.');
}
function deleteIdea(id, e) {
  if (e) e.stopPropagation();
  const idea = IDEAS.find(x => x.id === id);
  if (!idea) return;
  pendingConfirmAction = () => {
    IDEAS = IDEAS.filter(x => x.id !== id);
    saveIdeas(IDEAS);
    refreshAll();
    showToast('Idea "' + idea.name + '" eliminada');
  };
  showConfirm('Eliminar idea', 'Eliminar "' + idea.name + '"?');
}

function slugify(text) {
  return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function parseLines(val) { return val.split('\n').map(s => s.trim()).filter(Boolean); }

function saveForm(e) {
  e.preventDefault();
  const mode = document.getElementById('f-mode').value;
  const name = document.getElementById('f-name').value.trim();
  if (!name) return;

  if (mode === 'idea') {
    const idea = {
      id: editingId || slugify(name),
      name: name,
      desc: document.getElementById('f-desc').value.trim(),
      fire: parseInt(document.getElementById('f-fire').value) || 1,
      revenue: document.getElementById('f-revenue').value,
      tags: parseLines(document.getElementById('f-features').value).map(line => {
        const parts = line.split('|');
        return { label: parts[0].trim(), class: (parts[1] || '').trim() };
      })
    };
    if (editingId) {
      const idx = IDEAS.findIndex(x => x.id === editingId);
      if (idx >= 0) IDEAS[idx] = idea;
    } else {
      IDEAS.push(idea);
    }
    saveIdeas(IDEAS);
    showToast(editingId ? 'Idea actualizada' : 'Idea agregada');
  } else {
    const metricsRaw = parseLines(document.getElementById('f-metrics').value);
    const linksRaw = parseLines(document.getElementById('f-links').value);
    const project = {
      id: editingId || slugify(name),
      name: name,
      type: document.getElementById('f-type').value,
      accent: document.getElementById('f-accent').value,
      desc: document.getElementById('f-desc').value.trim(),
      stack: document.getElementById('f-stack').value.split(',').map(s => s.trim()).filter(Boolean),
      status: document.getElementById('f-status').value,
      statusText: document.getElementById('f-statusText').value.trim(),
      metrics: metricsRaw.map(line => {
        const parts = line.split('|');
        return { label: parts[0].trim(), value: parts[1]?.trim() || '', class: '' };
      }),
      revenue: document.getElementById('f-revenue').value,
      revenueText: document.getElementById('f-revenueText').value.trim(),
      next: document.getElementById('f-next').value.trim(),
      dashboard: document.getElementById('f-dashboard').value.trim() || undefined,
      links: linksRaw.map(line => {
        const parts = line.split('|');
        return { label: parts[0].trim(), url: parts[1]?.trim() || '' };
      }),
      details: {
        features: parseLines(document.getElementById('f-features').value),
        blockers: parseLines(document.getElementById('f-blockers').value)
      }
    };
    if (editingId) {
      const idx = PROJECTS.findIndex(x => x.id === editingId);
      if (idx >= 0) PROJECTS[idx] = project;
    } else {
      PROJECTS.push(project);
    }
    saveProjects(PROJECTS);
    showToast(editingId ? 'Proyecto actualizado' : 'Proyecto agregado');
  }

  closeFormModal();
  refreshAll();
}

  const map = { high: '$ Alto potencial', medium: '$ Medio', low: '$ Bajo', personal: 'Uso personal' };
  return map[revenue] || '';
}

    if (search && !p.name.toLowerCase().includes(search) && !p.desc.toLowerCase().includes(search)) return false;
    return true;
  });

  grid.innerHTML = filtered.map(p => `
    <div class="project-card" data-accent="${p.accent}" data-type="${p.type}" onclick="openModal('${p.id}')">
      <div class="card-actions">

      <div class="revenue-badge ${p.revenue}">${getRevenueLabel(p.revenue)}</div>

        <span class="status-text">${p.statusText}</span>

    if (!passesIdeaSubFilter(i, sub)) return false;

  });

  grid.innerHTML = filtered.map(i => `

}

let currentTab = 'developed';
let currentFilter = 'all';
let currentSubFilter = { developed: 'all', ideas: 'all' };

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tab));

  const filtersWrap = document.querySelectorAll('.filters');
  filtersWrap.forEach(el => el.style.display = tab === 'dashboards' ? 'none' : '');
  document.querySelectorAll('.filter-group').forEach(g => {
    g.style.display = g.dataset.for === tab ? 'flex' : 'none';
  });

  if (tab === 'dashboards') loadAllDashboards();
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  renderDevelopedProjects(filter, document.getElementById('search').value.toLowerCase());
}

function setSubFilter(tab, sub) {
  currentSubFilter[tab] = sub;
  document.querySelectorAll(`.filter-group[data-for="${tab}"] .sub-btn`).forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
  const search = document.getElementById('search').value.toLowerCase();
  if (tab === 'developed') renderDevelopedProjects(currentFilter, search);
  else renderIdeas(search);
}

function passesProjectSubFilter(p, sub) {
  if (sub === 'all') return true;
  if (sub === 'high' || sub === 'personal') return p.revenue === sub;
  return p.status === sub;
}

function passesIdeaSubFilter(i, sub) {
  if (sub === 'all') return true;
  if (sub === 'priority') return i.fire >= 3;
  if (sub === 'high') return i.revenue === 'high';
  const tags = i.tags || [];
  if (sub === 'pasivo') return tags.some(t => /pasiv/i.test(t.label));
  if (sub === 'innovador') return tags.some(t => /innovador/i.test(t.label));
  if (sub === 'ready') return tags.some(t => t.class === 'ready');
  if (sub === 'blocked') return tags.some(t => t.class === 'blocked');
  return true;
}

function filterProjects() {
  const search = document.getElementById('search').value.toLowerCase();
  renderDevelopedProjects(currentFilter, search);
  renderIdeas(search);
}

function renderDeepDive(d) {
  const block = (title, body) => body ? `<div class="modal-section"><h3>${title}</h3><p>${body}</p></div>` : '';
  const moneyRow = (obj, keys) => {
    if (!obj) return '';
    return keys.map(k => obj[k] ? `<div style="margin:0.3rem 0"><strong style="color:var(--cyan);text-transform:uppercase;font-size:0.7rem">${k}:</strong> <span style="color:var(--text-secondary);font-size:0.8rem">${obj[k]}</span></div>` : '').join('');
  };
  return `
    <div style="margin-top:2rem;padding-top:1rem;border-top:2px solid var(--cyan)">
      <h3 style="font-family:var(--font-display);color:var(--cyan);font-size:1rem;letter-spacing:0.1em;margin-bottom:1rem">DEEP DIVE</h3>
      ${block('Contexto', d.contexto)}

      ${d.retorno ? `<div class="modal-section"><h3>Retorno</h3>${moneyRow(d.retorno, ['conservador','optimista','breakeven'])}</div>` : ''}
      ${block('Decisiones abiertas', d.decisiones)}

  `;
}

  document.getElementById('modal').classList.remove('active');

const CRYPTO_API = 'http://localhost:5001';
const CHAINS = [
  { id: 'crypto', name: 'Solana', symbol: 'SOL' },
  { id: 'eth', name: 'Ethereum', symbol: 'ETH' },
  { id: 'base', name: 'Base', symbol: 'ETH' },
  { id: 'bsc', name: 'BSC', symbol: 'BNB' }
];
let chainData = {};
let currentDashTab = 'overview';

async function fetchChainData(chain) {
  try {
    const [ping, stats, open, closed, wallets] = await Promise.all([
      fetch(`${CRYPTO_API}/api/${chain.id}/ping`).then(r=>r.json()).catch(()=>({ok:false})),
      fetch(`${CRYPTO_API}/api/${chain.id}/stats`).then(r=>r.json()).catch(()=>null),
      fetch(`${CRYPTO_API}/api/${chain.id}/trades/open`).then(r=>r.json()).catch(()=>[]),
      fetch(`${CRYPTO_API}/api/${chain.id}/trades/closed?sort=time&order=desc`).then(r=>r.json()).catch(()=>[]),
      fetch(`${CRYPTO_API}/api/${chain.id}/wallets`).then(r=>r.json()).catch(()=>[])
    ]);
    chainData[chain.id] = { online: ping.ok, stats, open, closed, wallets };
  } catch(e) {
    chainData[chain.id] = { online: false, stats: null, open: [], closed: [], wallets: [] };
  }
}

async function fetchStrategiesData() {
  try {
    const [ping, stats, open, closed, backtest] = await Promise.all([
      fetch(`${CRYPTO_API}/api/strategies/ping`).then(r=>r.json()).catch(()=>({ok:false})),
      fetch(`${CRYPTO_API}/api/strategies/stats`).then(r=>r.json()).catch(()=>null),
      fetch(`${CRYPTO_API}/api/strategies/open`).then(r=>r.json()).catch(()=>[]),
      fetch(`${CRYPTO_API}/api/strategies/closed`).then(r=>r.json()).catch(()=>[]),
      fetch(`${CRYPTO_API}/api/strategies/backtest`).then(r=>r.json()).catch(()=>[])
    ]);
    chainData.strategies = { online: !!ping.ok, stats, open, closed, backtest };
  } catch(e) {
    chainData.strategies = { online: false, stats: null, open: [], closed: [], backtest: [] };
  }
}

async function loadAllDashboards() {
  await Promise.all(CHAINS.map(fetchChainData));
  await fetchStrategiesData();
  try {
    const [status, historial, bankroll] = await Promise.all([
      fetch(`${CRYPTO_API}/api/tenis/status`).then(r=>r.json()).catch(()=>({online:false})),
      fetch(`${CRYPTO_API}/api/tenis/historial`).then(r=>r.json()).catch(()=>[]),
      fetch(`${CRYPTO_API}/api/tenis/bankroll`).then(r=>r.json()).catch(()=>({bankroll:0}))
    ]);
    chainData.tenis = { online: status.online, stats: status.stats, historial, bankroll: bankroll.bankroll || 0 };
  } catch(e) {
    chainData.tenis = { online: false, stats: null, historial: [], bankroll: 0 };
  }
  try {
    const ema = await fetch('ema-ribbon-data.json', {cache:'no-store'}).then(r=>r.json());
    chainData.ema = ema;
  } catch(e) {
    chainData.ema = null;
  }
  renderDashContent();
}

function renderDashContent() {
  CHAINS.forEach(c => {
    const dot = document.getElementById(`dash-dot-${c.id}`);
    if(dot) dot.className = `dash-status-dot ${chainData[c.id]?.online ? 'online' : 'offline'}`;
  });
  const td = document.getElementById('dash-dot-tenis');
  if(td) td.className = `dash-status-dot ${chainData.tenis?.online ? 'online' : 'offline'}`;
  const sd = document.getElementById('dash-dot-strategies');
  if(sd) sd.className = `dash-status-dot ${chainData.strategies?.online ? 'online' : 'offline'}`;
  renderDashPanel();

  const panel = document.getElementById('dash-content');
