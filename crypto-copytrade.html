<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e1e4e8; }

.header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .updated { font-size: 12px; color: #8b949e; }

.tabs { display: flex; gap: 0; background: #161b22; border-bottom: 1px solid #30363d; padding: 0 24px; }
.tab { padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; color: #8b949e; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.tab:hover { color: #e1e4e8; }
.tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
.tab .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot-green { background: #3fb950; }
.dot-red { background: #f85149; }
.dot-gray { background: #484f58; }

.content { max-width: 1200px; margin: 0 auto; padding: 24px; }
.section { display: none; }
.section.active { display: block; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
.stat-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-card .value { font-size: 24px; font-weight: 700; }
.stat-card .value.positive { color: #3fb950; }
.stat-card .value.negative { color: #f85149; }
.stat-card .value.neutral { color: #58a6ff; }

table { width: 100%; border-collapse: collapse; background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
th { background: #1c2128; padding: 10px 14px; text-align: left; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
td { padding: 10px 14px; border-top: 1px solid #21262d; font-size: 13px; }
tr:hover { background: #1c2128; }
.pnl-pos { color: #3fb950; font-weight: 600; }
.pnl-neg { color: #f85149; font-weight: 600; }
.pnl-zero { color: #8b949e; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-tp { background: #1f3a2e; color: #3fb950; }
.badge-sl { background: #2a1f1f; color: #f85149; }
.badge-ws { background: #1f2a3a; color: #58a6ff; }
.badge-open { background: #1f3a2e; color: #3fb950; }

h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #c9d1d9; }

.offline-banner { background: #2a1f1f; border: 1px solid #f85149; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: #f85149; font-size: 13px; }
.online-banner { background: #1f3a2e; border: 1px solid #3fb950; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; color: #3fb950; font-size: 13px; }

.addr { font-family: monospace; font-size: 12px; color: #8b949e; }
.refresh-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.refresh-btn:hover { background: #30363d; }

.filters { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filters select, .filters input { background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
.filters input { width: 100px; }
.filters input[type="text"] { width: 90px; }
.filters select:focus, .filters input:focus { border-color: #58a6ff; outline: none; }

/* Overview grid */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 24px; }
.chain-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; cursor: pointer; transition: border-color 0.2s; }
.chain-card:hover { border-color: #58a6ff; }
.chain-card .chain-name { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.chain-card .chain-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.chain-card .cs-label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
.chain-card .cs-value { font-size: 18px; font-weight: 700; }
</style>

<div class="header">
  <h1>Trading Dashboard</h1>
  <div>
    <button class="refresh-btn" onclick="refreshAll()">Actualizar</button>
    <span class="updated" id="last-update"></span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">Overview</div>
  <div class="tab" onclick="showTab('solana')"><span class="dot dot-gray" id="dot-solana"></span>Solana</div>
  <div class="tab" onclick="showTab('eth')"><span class="dot dot-gray" id="dot-eth"></span>Ethereum</div>
  <div class="tab" onclick="showTab('base')"><span class="dot dot-gray" id="dot-base"></span>Base</div>
  <div class="tab" onclick="showTab('bsc')"><span class="dot dot-gray" id="dot-bsc"></span>BSC</div>
  <div class="tab" onclick="showTab('tenis')">Tenis EV</div>
</div>

<div class="content">
  <!-- OVERVIEW -->
  <div class="section active" id="sec-overview">
    <h2>Resumen Multi-Chain</h2>
    <div class="stats-grid" id="overview-totals"></div>
    <div class="overview-grid" id="overview-chains"></div>
  </div>

  <!-- CHAIN SECTIONS (generated dynamically) -->
  <div class="section" id="sec-solana"></div>
  <div class="section" id="sec-eth"></div>
  <div class="section" id="sec-base"></div>
  <div class="section" id="sec-bsc"></div>

  <!-- TENIS SECTION -->
  <div class="section" id="sec-tenis">
    <div id="tenis-status"></div>
    <div class="stats-grid" id="tenis-stats"></div>
    <h2>Historial Reciente</h2>
    <table><thead><tr>
      <th>Partido</th><th>Cuota</th><th>Prob</th><th>EV</th><th>Stake</th><th>Resultado</th><th>PnL</th>
    </tr></thead><tbody id="tenis-historial"></tbody></table>
  </div>
</div>

<script>
const CHAINS = [
  { id: 'solana', name: 'Solana', api: 'crypto', capital: 200 },
  { id: 'eth', name: 'Ethereum', api: 'eth', capital: 2000 },
  { id: 'base', name: 'Base', api: 'base', capital: 200 },
  { id: 'bsc', name: 'BSC', api: 'bsc', capital: 200 },
];

// Store chain data
const chainData = {};

function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  event.target.closest('.tab').classList.add('active');
  document.getElementById('sec-' + name).classList.add('active');
}

function pnlClass(val) {
  if (val > 0) return 'pnl-pos';
  if (val < 0) return 'pnl-neg';
  return 'pnl-zero';
}

function formatPrice(p) {
  if (!p) return '$0';
  if (p < 0.001) return '$' + p.toFixed(8);
  if (p < 1) return '$' + p.toFixed(6);
  if (p < 100) return '$' + p.toFixed(4);
  return '$' + p.toFixed(2);
}

function shortAddr(a) {
  return a ? a.slice(0, 6) + '..' + a.slice(-4) : '';
}

function reasonBadge(r) {
  if (r === 'take_profit') return '<span class="badge badge-tp">TP</span>';
  if (r === 'stop_loss') return '<span class="badge badge-sl">SL</span>';
  if (r === 'wallet_sold') return '<span class="badge badge-ws">Wallet</span>';
  return r || '';
}

// Build chain section HTML
function buildChainSection(chain) {
  return `
    <div class="stats-grid" id="${chain.id}-portfolio"></div>
    <div class="stats-grid" id="${chain.id}-stats"></div>
    <div class="stats-grid" id="${chain.id}-ev"></div>

    <h2>Trades Abiertos <span id="${chain.id}-open-count" style="font-size:13px;color:#8b949e;font-weight:400"></span></h2>
    <table><thead><tr>
      <th>Token</th><th>Wallet</th><th>Entry</th><th>Actual</th><th>PnL %</th><th>PnL $</th><th>Monto</th>
    </tr></thead><tbody id="${chain.id}-open"></tbody></table>

    <h2>Trades Cerrados <span id="${chain.id}-closed-count" style="font-size:13px;color:#8b949e;font-weight:400"></span></h2>
    <div class="filters">
      <select id="${chain.id}-filter-reason" onchange="loadChainClosed('${chain.id}')">
        <option value="">Todos</option>
        <option value="take_profit">Take Profit</option>
        <option value="stop_loss">Stop Loss</option>
        <option value="wallet_sold">Wallet Sold</option>
      </select>
      <select id="${chain.id}-filter-sort" onchange="loadChainClosed('${chain.id}')">
        <option value="time">Recientes</option>
        <option value="pnl">PnL %</option>
        <option value="amount">PnL $</option>
      </select>
      <select id="${chain.id}-filter-order" onchange="loadChainClosed('${chain.id}')">
        <option value="desc">Mayor a menor</option>
        <option value="asc">Menor a mayor</option>
      </select>
    </div>
    <table><thead><tr>
      <th>Token</th><th>Entry</th><th>Exit</th><th>PnL %</th><th>PnL $</th><th>Motivo</th><th>Monto</th>
    </tr></thead><tbody id="${chain.id}-closed"></tbody></table>

    <h2>Wallets Monitoreadas</h2>
    <table><thead><tr>
      <th>Address</th><th>PnL 30d</th><th>Win Rate</th><th>Trades</th>
    </tr></thead><tbody id="${chain.id}-wallets"></tbody></table>
  `;
}

// Initialize chain sections
CHAINS.forEach(c => {
  document.getElementById('sec-' + c.id).innerHTML = buildChainSection(c);
});

const closedDebounces = {};
function loadChainClosed(chainId) {
  clearTimeout(closedDebounces[chainId]);
  closedDebounces[chainId] = setTimeout(async () => {
    const chain = CHAINS.find(c => c.id === chainId);
    try {
      const params = new URLSearchParams();
      const reason = document.getElementById(`${chainId}-filter-reason`)?.value;
      const sort = document.getElementById(`${chainId}-filter-sort`)?.value;
      const order = document.getElementById(`${chainId}-filter-order`)?.value;
      if (reason) params.set('reason', reason);
      if (sort) params.set('sort', sort);
      if (order) params.set('order', order);

      const closed = await fetch(`/api/${chain.api}/trades/closed?${params}`).then(r => r.json());
      if (closed.error) { renderClosedEmpty(chainId); return; }
      document.getElementById(`${chainId}-closed-count`).textContent = closed.length > 0 ? `(${closed.length})` : '';
      document.getElementById(`${chainId}-closed`).innerHTML = closed.length === 0
        ? '<tr><td colspan="7" style="text-align:center;color:#8b949e">Sin trades cerrados</td></tr>'
        : closed.map(t => {
            const pnlPct = t.pnl_percent || 0;
            const pnlUsd = t.simulated_amount * (pnlPct / 100);
            return `<tr>
              <td><strong>${t.token_symbol}</strong></td>
              <td>${formatPrice(t.entry_price)}</td>
              <td>${formatPrice(t.exit_price || 0)}</td>
              <td class="${pnlClass(pnlPct)}">${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(1)}%</td>
              <td class="${pnlClass(pnlUsd)}">${pnlUsd >= 0 ? '+' : ''}$${pnlUsd.toFixed(2)}</td>
              <td>${reasonBadge(t.close_reason)}</td>
              <td>$${t.simulated_amount}</td>
            </tr>`;
          }).join('');
    } catch (e) { renderClosedEmpty(chainId); }
  }, 300);
}

function renderClosedEmpty(chainId) {
  document.getElementById(`${chainId}-closed-count`).textContent = '';
  document.getElementById(`${chainId}-closed`).innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e">Bot offline</td></tr>';
}

async function loadChain(chain) {
  const dot = document.getElementById('dot-' + chain.id);
  try {
    const [stats, open, wallets] = await Promise.all([
      fetch(`/api/${chain.api}/stats`).then(r => r.json()),
      fetch(`/api/${chain.api}/trades/open`).then(r => r.json()),
      fetch(`/api/${chain.api}/wallets`).then(r => r.json()),
    ]);

    if (stats.error) throw new Error(stats.error);

    dot.className = 'dot dot-green';
    chainData[chain.id] = { stats, open, wallets, online: true };

    const bankroll = stats.bankroll || 0;
    const roi = stats.roi || 0;
    const pnlUsd = stats.pnl_usd || 0;
    const unrealized = stats.unrealized_pnl_usd || 0;

    document.getElementById(`${chain.id}-portfolio`).innerHTML = `
      <div class="stat-card"><div class="label">Capital Inicial</div><div class="value neutral">$${stats.capital_inicial}</div></div>
      <div class="stat-card"><div class="label">Bankroll</div><div class="value ${bankroll >= stats.capital_inicial ? 'positive' : 'negative'}">$${bankroll.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">ROI</div><div class="value ${roi >= 0 ? 'positive' : 'negative'}">${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">PnL Realizado</div><div class="value ${pnlUsd >= 0 ? 'positive' : 'negative'}">${pnlUsd >= 0 ? '+' : ''}$${pnlUsd.toFixed(2)}</div></div>
      <div class="stat-card"><div class="label">PnL No Realizado</div><div class="value ${unrealized >= 0 ? 'positive' : 'negative'}">${unrealized >= 0 ? '+' : ''}$${unrealized.toFixed(2)}</div></div>
      <div class="stat-card"><div class="label">Trade Size</div><div class="value neutral">$${stats.trade_size}</div></div>
    `;

    const wr = stats.total_closed > 0 ? (stats.win_rate * 100).toFixed(0) + '%' : '-';
    document.getElementById(`${chain.id}-stats`).innerHTML = `
      <div class="stat-card"><div class="label">Wallets</div><div class="value neutral">${stats.active_wallets}</div></div>
      <div class="stat-card"><div class="label">Abiertos</div><div class="value neutral">${stats.open_trades}</div></div>
      <div class="stat-card"><div class="label">Cerrados</div><div class="value neutral">${stats.total_closed}</div></div>
      <div class="stat-card"><div class="label">Win Rate</div><div class="value neutral">${wr}</div></div>
      <div class="stat-card"><div class="label">TP / SL / Wallet</div><div class="value neutral">${stats.closed_by_tp || 0} / ${stats.closed_by_sl || 0} / ${stats.closed_by_ws || 0}</div></div>
      <div class="stat-card"><div class="label">Mejor / Peor</div><div class="value neutral">${stats.best_trade_pct >= 0 ? '+' : ''}${(stats.best_trade_pct || 0).toFixed(0)}% / ${(stats.worst_trade_pct || 0).toFixed(0)}%</div></div>
    `;

    const evPct = stats.ev_per_trade_pct || 0;
    const evUsd = stats.ev_per_trade_usd || 0;
    document.getElementById(`${chain.id}-ev`).innerHTML = `
      <div class="stat-card"><div class="label">EV / Trade</div><div class="value ${evPct >= 0 ? 'positive' : 'negative'}">${evPct >= 0 ? '+' : ''}${evPct.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="label">EV / Trade USD</div><div class="value ${evUsd >= 0 ? 'positive' : 'negative'}">${evUsd >= 0 ? '+' : ''}$${evUsd.toFixed(2)}</div></div>
      <div class="stat-card"><div class="label">Avg Win</div><div class="value positive">+${(stats.avg_win_pct||0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">Avg Loss</div><div class="value negative">${(stats.avg_loss_pct||0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">Win/Loss Ratio</div><div class="value ${(stats.win_loss_ratio||0) >= 1.5 ? 'positive' : 'negative'}">${(stats.win_loss_ratio||0).toFixed(2)}x</div></div>
    `;

    // Open trades
    document.getElementById(`${chain.id}-open-count`).textContent = open.length > 0 ? `(${open.length})` : '';
    const sortedOpen = (open.error ? [] : open).sort((a, b) => (b.pnl_percent || 0) - (a.pnl_percent || 0));
    document.getElementById(`${chain.id}-open`).innerHTML = sortedOpen.length === 0
      ? '<tr><td colspan="7" style="text-align:center;color:#8b949e">Sin trades abiertos</td></tr>'
      : sortedOpen.map(t => {
          const pnlUsd = t.simulated_amount * (t.pnl_percent / 100);
          return `<tr>
            <td><strong>${t.token_symbol}</strong></td>
            <td class="addr">${shortAddr(t.wallet_address)}</td>
            <td>${formatPrice(t.entry_price)}</td>
            <td>${formatPrice(t.current_price)}</td>
            <td class="${pnlClass(t.pnl_percent)}">${t.pnl_percent >= 0 ? '+' : ''}${t.pnl_percent.toFixed(1)}%</td>
            <td class="${pnlClass(pnlUsd)}">${pnlUsd >= 0 ? '+' : ''}$${pnlUsd.toFixed(2)}</td>
            <td>$${t.simulated_amount}</td>
          </tr>`;
        }).join('');

    // Closed trades
    await loadChainClosed(chain.id);

    // Wallets
    const wList = wallets.error ? [] : wallets;
    document.getElementById(`${chain.id}-wallets`).innerHTML = wList.length === 0
      ? '<tr><td colspan="4" style="text-align:center;color:#8b949e">Sin wallets activas</td></tr>'
      : wList.map(w => `<tr>
          <td class="addr">${shortAddr(w.address)}</td>
          <td class="${pnlClass(w.pnl_30d)}">$${w.pnl_30d.toFixed(0)}</td>
          <td>${(w.win_rate * 100).toFixed(0)}%</td>
          <td>${w.trade_count}</td>
        </tr>`).join('');

  } catch (e) {
    dot.className = 'dot dot-red';
    chainData[chain.id] = { online: false };
    document.getElementById(`${chain.id}-portfolio`).innerHTML = `<div class="offline-banner">${chain.name} bot offline</div>`;
    document.getElementById(`${chain.id}-stats`).innerHTML = '';
    document.getElementById(`${chain.id}-ev`).innerHTML = '';
    document.getElementById(`${chain.id}-open`).innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e">Offline</td></tr>';
    renderClosedEmpty(chain.id);
    document.getElementById(`${chain.id}-wallets`).innerHTML = '<tr><td colspan="4" style="text-align:center;color:#8b949e">Offline</td></tr>';
  }
}

function renderOverview() {
  let totalCapital = 0, totalBankroll = 0, totalPnl = 0, totalUnrealized = 0, totalOpen = 0, totalClosed = 0;
  let onlineCount = 0;

  const cardsHtml = CHAINS.map(chain => {
    const d = chainData[chain.id];
    if (!d || !d.online) {
      totalCapital += chain.capital;
      return `<div class="chain-card" onclick="showTabById('${chain.id}')">
        <div class="chain-name"><span class="dot dot-red"></span>${chain.name}</div>
        <div style="color:#8b949e">Offline</div>
      </div>`;
    }

    const s = d.stats;
    const bankroll = s.bankroll || 0;
    const pnl = s.pnl_usd || 0;
    const roi = s.roi || 0;
    const unrealized = s.unrealized_pnl_usd || 0;

    totalCapital += s.capital_inicial || chain.capital;
    totalBankroll += bankroll;
    totalPnl += pnl;
    totalUnrealized += unrealized;
    totalOpen += s.open_trades || 0;
    totalClosed += s.total_closed || 0;
    onlineCount++;

    return `<div class="chain-card" onclick="showTabById('${chain.id}')">
      <div class="chain-name"><span class="dot dot-green"></span>${chain.name}</div>
      <div class="chain-stats">
        <div><div class="cs-label">Bankroll</div><div class="cs-value ${bankroll >= (s.capital_inicial||chain.capital) ? 'positive' : 'negative'}">$${bankroll.toFixed(0)}</div></div>
        <div><div class="cs-label">ROI</div><div class="cs-value ${roi >= 0 ? 'positive' : 'negative'}">${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%</div></div>
        <div><div class="cs-label">PnL</div><div class="cs-value ${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(0)}</div></div>
        <div><div class="cs-label">Trades</div><div class="cs-value neutral">${s.open_trades || 0} / ${s.total_closed || 0}</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('overview-chains').innerHTML = cardsHtml;

  const totalRoi = totalCapital > 0 ? (totalPnl / totalCapital * 100) : 0;
  document.getElementById('overview-totals').innerHTML = `
    <div class="stat-card"><div class="label">Capital Total</div><div class="value neutral">$${totalCapital.toLocaleString()}</div></div>
    <div class="stat-card"><div class="label">Bankroll Total</div><div class="value ${totalBankroll >= totalCapital ? 'positive' : 'negative'}">$${totalBankroll.toFixed(0)}</div></div>
    <div class="stat-card"><div class="label">ROI Global</div><div class="value ${totalRoi >= 0 ? 'positive' : 'negative'}">${totalRoi >= 0 ? '+' : ''}${totalRoi.toFixed(1)}%</div></div>
    <div class="stat-card"><div class="label">PnL Total</div><div class="value ${totalPnl >= 0 ? 'positive' : 'negative'}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div></div>
    <div class="stat-card"><div class="label">No Realizado</div><div class="value ${totalUnrealized >= 0 ? 'positive' : 'negative'}">${totalUnrealized >= 0 ? '+' : ''}$${totalUnrealized.toFixed(2)}</div></div>
    <div class="stat-card"><div class="label">Trades Abiertos/Cerrados</div><div class="value neutral">${totalOpen} / ${totalClosed}</div></div>
  `;
}

function showTabById(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => { if (t.textContent.trim().toLowerCase().includes(id === 'eth' ? 'ethereum' : id)) t.classList.add('active'); });
  document.getElementById('sec-' + id).classList.add('active');
}

async function loadTenis() {
  try {
    const status = await fetch('/api/tenis/status').then(r => r.json());
    if (!status.online) {
      document.getElementById('tenis-status').innerHTML = '<div class="offline-banner">Tenis EV offline</div>';
      document.getElementById('tenis-stats').innerHTML = '';
      document.getElementById('tenis-historial').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#8b949e">Offline</td></tr>';
      return;
    }
    document.getElementById('tenis-status').innerHTML = '<div class="online-banner">Tenis EV conectado</div>';
    const s = status.stats;
    const [historial, bankroll] = await Promise.all([
      fetch('/api/tenis/historial').then(r => r.json()),
      fetch('/api/tenis/bankroll').then(r => r.json()),
    ]);
    document.getElementById('tenis-stats').innerHTML = `
      <div class="stat-card"><div class="label">Bankroll</div><div class="value neutral">$${(bankroll.bankroll || 0).toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">Apuestas</div><div class="value neutral">${s.total || 0}</div></div>
      <div class="stat-card"><div class="label">Win Rate</div><div class="value ${(s.win_rate||0) >= 50 ? 'positive' : 'negative'}">${(s.win_rate||0).toFixed(0)}%</div></div>
      <div class="stat-card"><div class="label">ROI</div><div class="value ${(s.roi||0) >= 0 ? 'positive' : 'negative'}">${(s.roi||0) >= 0 ? '+' : ''}${(s.roi||0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">PnL</div><div class="value ${(s.pnl_neto||0) >= 0 ? 'positive' : 'negative'}">${(s.pnl_neto||0) >= 0 ? '+' : ''}$${(s.pnl_neto||0).toFixed(0)}</div></div>
    `;
    document.getElementById('tenis-historial').innerHTML = historial.length === 0
      ? '<tr><td colspan="7" style="text-align:center;color:#8b949e">Sin apuestas</td></tr>'
      : historial.map(a => {
          const res = a.resultado === 'ganada' ? '<span class="badge badge-tp">W</span>'
                    : a.resultado === 'perdida' ? '<span class="badge badge-sl">L</span>'
                    : '<span class="badge badge-open">Pend</span>';
          const pnl = a.pnl_neto || 0;
          return `<tr>
            <td>${a.partido || ''}</td>
            <td>${(a.cuota || 0).toFixed(2)}</td>
            <td>${((a.probabilidad || 0) * 100).toFixed(0)}%</td>
            <td>${((a.ev || 0) * 100).toFixed(1)}%</td>
            <td>$${(a.stake || 0).toFixed(0)}</td>
            <td>${res}</td>
            <td class="${pnlClass(pnl)}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(0)}</td>
          </tr>`;
        }).join('');
  } catch (e) {
    document.getElementById('tenis-status').innerHTML = '<div class="offline-banner">Error Tenis EV</div>';
  }
}

async function refreshAll() {
  await Promise.all(CHAINS.map(c => loadChain(c)));
  renderOverview();
  loadTenis();
  document.getElementById('last-update').textContent = 'Actualizado: ' + new Date().toLocaleTimeString();
}

refreshAll();
setInterval(refreshAll, 60000);
</script>

<script>
if (window.__STATIC_MODE__) {
  const SD = window.__STATIC_DATA__;
  const API = 'http://localhost:5001';

  // Override refreshAll and initial load
  window.refreshAll = function() { loadStaticData(); };

  function loadStaticData() {
    // Stats
    const s = SD.stats;
    const wr = s.closed > 0 ? (s.wins / s.closed * 100) : 0;
    const activeW = SD.wallets.filter(w => w.active).length;

    const totalPnlUsd = s.total_pnl_usd || 0;
    const paperBankroll = 200 + totalPnlUsd;
    const pnlColor = totalPnlUsd >= 0 ? 'positive' : 'negative';
    const pnlSign = totalPnlUsd >= 0 ? '+' : '';

    const portfolio = document.getElementById('crypto-portfolio');
    if (portfolio) portfolio.innerHTML = `
      <div class="stat-card"><div class="label">Paper Bankroll</div><div class="value ${pnlColor}">$${paperBankroll.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">P&L Total</div><div class="value ${pnlColor}">${pnlSign}$${totalPnlUsd.toFixed(0)}</div></div>
      <div class="stat-card"><div class="label">Wallets Activas</div><div class="value neutral">${activeW}</div></div>
      <div class="stat-card"><div class="label">Open Trades</div><div class="value neutral">${s.open_count || 0}</div></div>
      <div class="stat-card"><div class="label">Capital en Open</div><div class="value neutral">$${s.open_capital || 0}</div></div>
      <div class="stat-card"><div class="label">Config</div><div class="value" style="font-size:14px;color:#8b949e">SL -15% / TP +50%</div></div>
    `;

    const statsEl = document.getElementById('crypto-stats');
    if (statsEl) statsEl.innerHTML = `
      <div class="stat-card"><div class="label">Total Trades</div><div class="value neutral">${s.total}</div></div>
      <div class="stat-card"><div class="label">Cerrados</div><div class="value neutral">${s.closed}</div></div>
      <div class="stat-card"><div class="label">Win Rate</div><div class="value ${wr>50?'positive':'negative'}">${wr.toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">Avg PnL%</div><div class="value ${(s.avg_pnl||0)>=0?'positive':'negative'}">${s.avg_pnl?s.avg_pnl.toFixed(2):'0'}%</div></div>
    `;

    const evEl = document.getElementById('crypto-ev');
    if (evEl) evEl.innerHTML = `
      <div class="stat-card"><div class="label">Best Trade</div><div class="value positive">+${(s.best_trade||0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">Worst Trade</div><div class="value negative">${(s.worst_trade||0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="label">Take Profit</div><div class="value positive">${s.tp_count || 0}</div></div>
      <div class="stat-card"><div class="label">Stop Loss</div><div class="value negative">${s.sl_count || 0}</div></div>
      <div class="stat-card"><div class="label">Wallet Sold</div><div class="value neutral">${s.ws_count || 0}</div></div>
    `;

    // Open trades
    const openTrades = SD.trades.filter(t => t.status === 'open');
    const openBody = document.getElementById('crypto-open');
    if (openBody) {
      document.getElementById('crypto-open-count').textContent = `(${openTrades.length})`;
      openBody.innerHTML = openTrades.slice(0,50).map(t => `<tr>
        <td>${t.token_symbol || t.token_address.slice(0,6)}</td>
        <td class="addr">${t.wallet_address.slice(0,6)}...${t.wallet_address.slice(-4)}</td>
        <td>$${t.entry_price?.toFixed(8) || '?'}</td>
        <td>$${t.current_price?.toFixed(8) || '?'}</td>
        <td class="${(t.pnl_percent||0)>=0?'pnl-pos':'pnl-neg'}">${(t.pnl_percent||0).toFixed(2)}%</td>
        <td>$${((t.pnl_percent||0)/100*t.simulated_amount).toFixed(2)}</td>
        <td>$${t.simulated_amount}</td>
      </tr>`).join('');
    }

    // Closed trades
    loadClosedStatic();

    // Last update
    const lu = document.getElementById('last-update');
    if (lu) lu.textContent = 'Datos embebidos';
  }

  window.loadClosedTrades = loadClosedStatic;

  function loadClosedStatic() {
    let closed = SD.trades.filter(t => t.status === 'closed');
    const reason = document.getElementById('filter-reason')?.value;
    const search = document.getElementById('filter-token')?.value?.toLowerCase();
    if (reason) closed = closed.filter(t => t.close_reason === reason);
    if (search) closed = closed.filter(t => (t.token_symbol||'').toLowerCase().includes(search));

    const body = document.getElementById('crypto-closed');
    const countEl = document.getElementById('crypto-closed-count');
    if (countEl) countEl.textContent = `(${closed.length})`;
    if (body) {
      body.innerHTML = closed.slice(0,100).map(t => {
        const bc = t.close_reason === 'take_profit' ? 'badge-tp' : t.close_reason === 'stop_loss' ? 'badge-sl' : 'badge-ws';
        return `<tr>
          <td>${t.token_symbol || t.token_address.slice(0,6)}</td>
          <td class="addr">${t.wallet_address.slice(0,6)}...${t.wallet_address.slice(-4)}</td>
          <td>$${t.entry_price?.toFixed(8) || '?'}</td>
          <td>$${t.exit_price?.toFixed(8) || '?'}</td>
          <td class="${(t.pnl_percent||0)>=0?'pnl-pos':'pnl-neg'}">${(t.pnl_percent||0).toFixed(2)}%</td>
          <td>$${((t.pnl_percent||0)/100*t.simulated_amount).toFixed(2)}</td>
          <td><span class="badge ${bc}">${t.close_reason || '-'}</span></td>
        </tr>`;
      }).join('');
    }
  }

  // Hide tenis tab if present
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes('Tenis')) t.style.display = 'none';
  });

  // Auto-load
  setTimeout(loadStaticData, 100);
}
</script>
